<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Fundo Arredondado Escuro -->
  <rect width="256" height="256" rx="56" fill="url(#bg)" />
  
  <g filter="url(#shadow)">
    <!-- Relógio (Histórico) -->
    <circle cx="128" cy="128" r="64" fill="none" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round" />
    <polyline points="128 88 128 128 152 152" fill="none" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Seta Circular de Retorno -->
    <path d="M 60 90 A 80 80 0 0 0 196 170" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" />
    <polyline points="40 100 60 90 70 110" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
